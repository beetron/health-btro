server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    root /var/www/html/public;
    index index.php index.html;

    server_name _;
    charset utf-8;

    # Disable logging for favicon and robots.txt
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Handle standard Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Custom health check endpoint optimization
    location = /healthz {
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cache static assets generated by Vite
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM listening on local port 9000
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Security hardening
        fastcgi_hide_header X-Powered-By;
    }

    # Block access to hidden system files
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
